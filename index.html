<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temple Run - Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="ui">
    <div class="left">
      <div class="score">Score: <span id="score">0</span></div>
      <div class="multiplier">x<span id="mult">1</span></div>
    </div>
    <div class="right">
      <div class="coins">Coins: <span id="coins">0</span></div>
      <div class="best">Best: <span id="best">0</span></div>
    </div>
  </div>

  <canvas id="game" width="900" height="600"></canvas>

  <div id="overlay" class="show">
    <div class="panel">
      <h1>TEMPLE RUN</h1>
      <p class="hint">A/D or ◀▶ to switch lanes · W/Space or ▲ to jump · S or ▼ to slide</p>
      <button id="startBtn">Start Run</button>
      <div class="stats">
        <div>Best Score: <span id="ov-best">0</span></div>
        <div>Total Coins: <span id="ov-total-coins">0</span></div>
      </div>
      <div class="credits">Built with HTML5 Canvas</div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
